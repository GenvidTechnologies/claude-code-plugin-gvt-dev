name: leak-guard

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  leak-grep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Org-specific leak grep
        run: |
          set -euo pipefail
          patterns='C:/repos/|C:/Users/|@genvidtech|fninoles|genvidtech/'
          # Exclude this workflow file itself: it necessarily contains the
          # patterns above as its own definition, which would self-match.
          if git ls-files -- ':!.github/workflows/leak-guard.yml' | xargs grep -nE "$patterns"; then
            echo "::error::org-specific leak pattern found"
            exit 1
          fi
          echo "no org-specific leak patterns found"
